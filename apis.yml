apis:
  - name: Microsoft Graph Excel API
    description: >-
      REST API for accessing and manipulating Excel workbooks stored in OneDrive
      for Business, SharePoint sites, or Group drives through Microsoft Graph.
      Supports worksheet, table, chart, range, named item, and function operations.
    humanURL: https://learn.microsoft.com/en-us/graph/api/resources/excel
    baseURL: https://graph.microsoft.com/v1.0
    tags:
      - Cloud
      - Microsoft Graph
      - OneDrive
      - REST API
      - SharePoint
