specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Microsoft Excel
providerId: microsoft-excel
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Spreadsheets
  - Productivity
  - Office
  - Microsoft 365
  - Microsoft Graph
  - Microsoft
description: The Microsoft Excel REST API is delivered through Microsoft Graph (workbook endpoints) and
  via the Office JavaScript / Office Add-ins SDK. There is no per-call list price. Access requires a Microsoft
  365 / Office 365 subscription (Business Basic, Business Standard, Business Premium, Apps for Business,
  E3, E5) or a free Microsoft account on Excel for the web. Free desktop trial via Microsoft 365 30-day
  trial.
sources:
  - https://www.microsoft.com/en-us/microsoft-365/business/compare-all-plans
  - https://www.microsoft.com/en-us/microsoft-365/enterprise/microsoft365-plans-and-pricing
  - https://learn.microsoft.com/en-us/graph/api/resources/excel
plans:
  - id: microsoft-excel-web-free
    name: Excel for the Web (Free)
    type: freemium
    description: Browser-based Excel with a free Microsoft account. Limited to web client; no install.
    entries:
      - label: Free with a Microsoft account
        name: excel_web_free
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: true
    elements:
      - name: Excel for the Web
      - name: 5 GB OneDrive
      - name: Office Scripts
  - id: microsoft-excel-business-basic
    name: Microsoft 365 Business Basic
    type: subscription
    description: Web + mobile Office apps including Excel for the Web. $6.00/user/month, paid yearly (with
      Teams) or $4.40 without Teams.
