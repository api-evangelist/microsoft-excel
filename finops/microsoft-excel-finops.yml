description: 'FOCUS-aligned FinOps for Microsoft Excel: bundled with Microsoft 365 / Office 365 per-user-per-month
  subscriptions; no incremental per-call API charge. Costs flow through the parent Microsoft 365 SKU.'
sources:
  - https://www.microsoft.com/en-us/microsoft-365/business/compare-all-plans
  - https://www.microsoft.com/en-us/microsoft-365/enterprise/microsoft365-plans-and-pricing
billingModel:
  pricingCategory: Subscription (bundled with Microsoft 365)
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
focusColumns:
  ServiceName: Microsoft Excel
  ServiceCategory: Productivity
  ProviderName: Microsoft
  PublisherName: Microsoft Corporation
  InvoiceIssuerName: Microsoft Corporation
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: m365_seats
    description: Microsoft 365 seats granting Excel entitlement (Business Basic / Standard / Premium /
      E3 / E5 / Apps for Business / Apps for Enterprise)
    unit: seat
    aggregation: sum
    dimensions:
      - tenant
      - sku
  - name: workbook_api_requests
    description: Microsoft Graph workbook API calls (no charge; tracked for capacity and throttling)
    unit: request
    aggregation: sum
    dimensions:
      - tenant
      - application
  - name: workbook_storage
    description: Storage consumed by .xlsx files in OneDrive / SharePoint
    unit: GB
    aggregation: sum
    dimensions:
      - drive
      - tenant
principles:
  - name: Visibility
    description: Use the Microsoft 365 admin centre Active Users report and Microsoft 365 Usage Analytics
      to see Excel consumption; capture Microsoft Graph throttling telemetry from request-id and x-ms-throttle-scope
      headers.
  - name: Allocation
    description: Map Microsoft 365 seat assignments to Entra groups bound to cost-centres for chargeback;
      tag programmatic Excel API access by the calling application.
  - name: Optimization
    description: Right-size the Microsoft 365 SKU mix (downgrade rarely-used desktop seats to Business
      Basic); persist workbook sessions and use $batch to reduce throttling exposure.
  - name: Accountability
    description: Workplace IT owns the M365 SKU mix; engineering owns Office Add-in / Graph workbook automations
      and their throttling budget.
maintainers:
